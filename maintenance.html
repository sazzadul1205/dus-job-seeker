<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
      padding: 20px;
      margin: 0;
    }

    .maintenance-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 60px 50px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .icon-wrapper {
      display: inline-block;
      margin-bottom: 30px;
      animation: pulse 2s ease-in-out infinite;
    }

    .icon {
      font-size: 80px;
      line-height: 1;
      display: block;
    }

    .gear-icon {
      display: inline-block;
      animation: spin 8s linear infinite;
      font-size: 80px;
      line-height: 1;
    }

    h1 {
      color: #ffffff;
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px 25px;
      margin: 30px 0;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      color: rgba(255, 255, 255, 0.8);
      font-size: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .status-dot.maintenance {
      background: #fbbf24;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-dot.operational {
      background: #34d399;
    }

    .status-value {
      font-weight: 500;
      color: #fbbf24;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      margin: 25px 0 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
      border-radius: 10px;
      width: 65%;
      animation: progressPulse 2s ease-in-out infinite;
    }

    @keyframes progressPulse {

      0%,
      100% {
        width: 60%;
      }

      50% {
        width: 75%;
      }
    }

    .progress-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    .social-links {
      margin-top: 35px;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .social-link {
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .social-link:hover {
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .footer-text {
      margin-top: 30px;
      color: rgba(255, 255, 255, 0.2);
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    /* Dark mode support */
    @media (prefers-color-scheme: light) {
      body {
        background: linear-gradient(145deg, #667eea, #764ba2);
      }
    }

    /* Mobile responsiveness */
    @media (max-width: 640px) {
      .maintenance-container {
        padding: 40px 25px;
      }

      h1 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 17px;
      }

      .icon,
      .gear-icon {
        font-size: 60px;
      }

      .status-item {
        font-size: 13px;
        flex-wrap: wrap;
        gap: 5px;
      }

      .social-links {
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>
  <div class="maintenance-container">
    <!-- Icon with spinning gear -->
    <div class="icon-wrapper">
      <span class="icon">🔧</span>
    </div>

    <!-- Main heading -->
    <h1>Under Maintenance</h1>

    <!-- Subtitle -->
    <p class="subtitle">
      We're working hard to improve your experience.<br>
      We'll be back online shortly.
    </p>

    <!-- Status Card -->
    <div class="status-card">
      <div class="status-item">
        <span class="status-label">
          <span class="status-dot maintenance"></span>
          Current Status
        </span>
        <span class="status-value">🔄 Maintenance in progress</span>
      </div>
      <div class="status-item">
        <span class="status-label">
          <span class="status-dot operational"></span>
          Expected completion
        </span>
        <span style="color: rgba(255,255,255,0.7);">~30 minutes</span>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <div class="progress-label">Estimated progress</div>

    <!-- Social/Contact links -->
    <div class="social-links">
      <a href="#" class="social-link">📧 Email Us</a>
      <a href="#" class="social-link">🐦 Twitter</a>
      <a href="#" class="social-link">💬 Support</a>
    </div>

    <!-- Footer -->
    <div class="footer-text">
      &copy; 2026 Your Company. All rights reserved.
    </div>
  </div>
</body>

</html>
